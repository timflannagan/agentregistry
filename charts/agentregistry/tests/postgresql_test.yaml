suite: PostgreSQL sub-deployment
templates:
  - postgresql.yaml

tests:
  - it: renders PVC, Deployment, and Service when bundled is enabled
    asserts:
      - hasDocuments:
          count: 3

  - it: PVC has correct name
    documentIndex: 0
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-postgresql-data

  - it: PVC requests correct storage size
    documentIndex: 0
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi

  - it: PVC has keep annotation when keepOnUninstall is true
    set:
      database.bundled.persistence.keepOnUninstall: true
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep

  - it: PVC uses existingClaim when set
    set:
      database.bundled.persistence.existingClaim: my-existing-pvc
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Deployment
        documentIndex: 0

  - it: Deployment uses the correct pgvector image
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/pgvector/pgvector:0.8.2-pg16

  - it: Deployment uses custom image tag
    set:
      database.bundled.image.tag: "0.8.2-pg16"
    documentIndex: 1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/pgvector/pgvector:0.8.2-pg16

  - it: Deployment uses strategy Recreate
    documentIndex: 1
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: Deployment sets POSTGRES_DB and POSTGRES_USER env vars
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DB
            value: "agent-registry"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_USER
            value: "agentregistry"

  - it: Deployment injects POSTGRES_PASSWORD from secret
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-agentregistry
                key: POSTGRES_PASSWORD

  - it: Deployment applies pod security context
    documentIndex: 1
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 999

  - it: Deployment applies container security context
    documentIndex: 1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: Deployment has liveness and readiness probes
    documentIndex: 1
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: Deployment mounts postgres-data volume
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: postgres-data
            mountPath: /var/lib/postgresql/data

  - it: Deployment uses existing PVC claim when existingClaim is set
    set:
      database.bundled.persistence.existingClaim: my-pvc
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: my-pvc

  - it: Service has correct port
    documentIndex: 2
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].port
          value: 5432
      - equal:
          path: spec.ports[0].targetPort
          value: 5432

  - it: Service has correct component label
    documentIndex: 2
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: database

  - it: renders nothing when bundled is disabled
    set:
      database.bundled.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: uses global.imageRegistry override
    set:
      global.imageRegistry: my-registry.example.com
    documentIndex: 1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: my-registry.example.com/pgvector/pgvector:0.8.2-pg16
