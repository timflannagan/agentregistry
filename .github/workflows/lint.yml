name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
    types: [checks_requested]

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          args: --fix

  lint-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.x

      - name: Lint UI
        run: make lint-ui
